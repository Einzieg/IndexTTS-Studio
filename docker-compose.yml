services:
  studio:
    build:
      context: .
      dockerfile: Dockerfile
    image: indextts-studio:local
    container_name: indextts-studio
    environment:
      INDEXTTS_STUDIO_ROOT: /app
      INDEXTTS_STUDIO_HOST: ${INDEXTTS_STUDIO_DOCKER_HOST:-0.0.0.0}
      INDEXTTS_STUDIO_PORT: ${INDEXTTS_STUDIO_DOCKER_PORT:-8000}
      INDEXTTS_STUDIO_LOG_LEVEL: ${INDEXTTS_STUDIO_LOG_LEVEL:-INFO}
      INDEXTTS_STUDIO_AUTH_ENABLED: ${INDEXTTS_STUDIO_AUTH_ENABLED:-false}
      INDEXTTS_STUDIO_AUTH_USERNAME: ${INDEXTTS_STUDIO_AUTH_USERNAME:-}
      INDEXTTS_STUDIO_AUTH_PASSWORD: ${INDEXTTS_STUDIO_AUTH_PASSWORD:-}
      INDEXTTS_STUDIO_AUTH_SESSION_SECRET: ${INDEXTTS_STUDIO_AUTH_SESSION_SECRET:-}
      INDEXTTS_STUDIO_AUTH_COOKIE_NAME: ${INDEXTTS_STUDIO_AUTH_COOKIE_NAME:-indextts_studio_session}
      INDEXTTS_STUDIO_AUTH_SESSION_TTL_SECONDS: ${INDEXTTS_STUDIO_AUTH_SESSION_TTL_SECONDS:-43200}
      INDEXTTS_STUDIO_AUTH_SECURE_COOKIE: ${INDEXTTS_STUDIO_AUTH_SECURE_COOKIE:-false}
      INDEXTTS_STUDIO_AUTH_SAME_SITE: ${INDEXTTS_STUDIO_AUTH_SAME_SITE:-lax}
      INDEXTTS_STUDIO_DATA_DIR: /app/data
      INDEXTTS_STUDIO_BACKEND: ${INDEXTTS_STUDIO_BACKEND:-remote_gradio}
      INDEXTTS_STUDIO_WARMUP_ON_STARTUP: ${INDEXTTS_STUDIO_DOCKER_WARMUP_ON_STARTUP:-false}
      INDEXTTS_STUDIO_GRADIO_BASE_URL: ${INDEXTTS_STUDIO_DOCKER_GRADIO_BASE_URL:-http://host.docker.internal:7861}
      INDEXTTS_STUDIO_GRADIO_API_PREFIX: ${INDEXTTS_STUDIO_GRADIO_API_PREFIX:-/gradio_api}
      INDEXTTS_STUDIO_GRADIO_API_NAME: ${INDEXTTS_STUDIO_GRADIO_API_NAME:-/gen_single}
      INDEXTTS_STUDIO_GRADIO_REQUEST_TIMEOUT_SECONDS: ${INDEXTTS_STUDIO_GRADIO_REQUEST_TIMEOUT_SECONDS:-60}
      INDEXTTS_STUDIO_GRADIO_STREAM_TIMEOUT_SECONDS: ${INDEXTTS_STUDIO_GRADIO_STREAM_TIMEOUT_SECONDS:-300}
    ports:
      - "127.0.0.1:${INDEXTTS_STUDIO_DOCKER_PORT:-8000}:${INDEXTTS_STUDIO_DOCKER_PORT:-8000}"
    volumes:
      - ./data:/app/data
    networks:
      - indextts-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      index-tts:
        condition: service_healthy
        required: false
    restart: unless-stopped

  index-tts:
    build:
      context: .
      dockerfile: docker/index-tts/Dockerfile
      args:
        INDEXTTS_CUDA_BASE_IMAGE: ${INDEXTTS_CUDA_BASE_IMAGE:-nvidia/cuda:12.8.1-cudnn-runtime-ubuntu22.04}
        INDEXTTS_UPSTREAM_REPO: ${INDEXTTS_UPSTREAM_REPO:-https://github.com/index-tts/index-tts.git}
        INDEXTTS_UPSTREAM_REF: ${INDEXTTS_UPSTREAM_REF:-7264ce2a9a0924becb6b8da3f60725f7663de089}
    image: indextts-upstream:local
    container_name: index-tts
    profiles:
      - bundled
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    expose:
      - "7861"
    environment:
      INDEXTTS_MODEL_DIR: /opt/index-tts/checkpoints
      INDEXTTS_MODEL_SOURCE: ${INDEXTTS_MODEL_SOURCE:-auto}
      INDEXTTS_MODEL_REPO: ${INDEXTTS_MODEL_REPO:-IndexTeam/IndexTTS-2}
      INDEXTTS_MODELSCOPE_MODEL_ID: ${INDEXTTS_MODELSCOPE_MODEL_ID:-IndexTeam/IndexTTS-2}
      INDEXTTS_BOOTSTRAP_RETRIES: ${INDEXTTS_BOOTSTRAP_RETRIES:-20}
      INDEXTTS_BOOTSTRAP_RETRY_DELAY: ${INDEXTTS_BOOTSTRAP_RETRY_DELAY:-15}
      INDEXTTS_WEBUI_HOST: 0.0.0.0
      INDEXTTS_WEBUI_PORT: 7861
      INDEXTTS_FORCE_CPU: ${INDEXTTS_FORCE_CPU:-false}
      INDEXTTS_WEBUI_FP16: ${INDEXTTS_WEBUI_FP16:-true}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_ENDPOINT: ${HF_ENDPOINT:-}
      NVIDIA_VISIBLE_DEVICES: ${INDEXTTS_NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${INDEXTTS_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - index-tts-models:/opt/index-tts/checkpoints
      - index-tts-hf-cache:/root/.cache/huggingface
      - index-tts-ms-cache:/root/.cache/modelscope
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:7861/ > /dev/null || pgrep -f 'index-tts-bootstrap-models.py' > /dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    networks:
      - indextts-net
    restart: unless-stopped

networks:
  indextts-net:
    name: indextts-studio-net

volumes:
  index-tts-models:
  index-tts-hf-cache:
  index-tts-ms-cache:
