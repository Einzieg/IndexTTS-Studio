name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest -q

  web-build:
    name: Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Typecheck frontend
        working-directory: web
        run: npm run typecheck

      - name: Build frontend
        working-directory: web
        run: npm run build

  docker-compose-config:
    name: Docker Compose Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare .env
        run: cp .env.example .env

      - name: Render default docker compose config
        run: docker compose config > /tmp/docker-compose.rendered.yml

      - name: Render bundled docker compose config
        run: docker compose --profile bundled config > /tmp/docker-compose.bundled.yml
